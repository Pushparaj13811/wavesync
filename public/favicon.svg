<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="waveGradFav" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" ry="7" fill="#0A0A0F"/>

  <!-- 5 simplified bars for small size clarity -->
