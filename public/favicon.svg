  <rect x="9.5"  y="9"   width="3" height="14" rx="1.5" fill="url(#waveGradFav)" opacity="0.82"/>
  <rect x="14.5" y="5"   width="3" height="22" rx="1.5" fill="url(#waveGradFav)"/>
  <rect x="19.5" y="9"   width="3" height="14" rx="1.5" fill="url(#waveGradFav)" opacity="0.82"/>
  <rect x="24.5" y="13"  width="3" height="6"  rx="1.5" fill="url(#waveGradFav)" opacity="0.70"/>
</svg>
