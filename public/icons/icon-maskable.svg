<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="waveGradMask" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glowMask" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full bleed dark background (maskable icons must fill entire canvas) -->
  <rect width="512" height="512" fill="#0A0A0F"/>

  <!-- Subtle glow -->
  <rect width="512" height="512" fill="url(#glowMask)"/>

  <!--
    Maskable safe zone is the inner 80% circle (r=204.8 from center).
    We keep all content within roughly 82px inset on each side.
    Content area: x 82..430, y 82..430  (346x346)
  -->

  <!-- 7 bars, each 28px wide with 14px gap -->
  <!-- Total width: 7*28 + 6*14 = 280, offset-x = 82 + (346-280)/2 = 82+33 = 115 -->
  <g>
    <rect x="116" y="228" width="28" height="56"  rx="14" fill="url(#waveGradMask)" opacity="0.65"/>
    <rect x="158" y="198" width="28" height="116" rx="14" fill="url(#waveGradMask)" opacity="0.75"/>
    <rect x="200" y="162" width="28" height="188" rx="14" fill="url(#waveGradMask)" opacity="0.85"/>
    <rect x="242" y="132" width="28" height="248" rx="14" fill="url(#waveGradMask)"/>
    <rect x="284" y="162" width="28" height="188" rx="14" fill="url(#waveGradMask)" opacity="0.85"/>
    <rect x="326" y="198" width="28" height="116" rx="14" fill="url(#waveGradMask)" opacity="0.75"/>
    <rect x="368" y="228" width="28" height="56"  rx="14" fill="url(#waveGradMask)" opacity="0.65"/>
  </g>
</svg>
