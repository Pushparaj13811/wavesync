<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="waveGrad192" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <clipPath id="roundClip192">
      <rect width="192" height="192" rx="38" ry="38"/>
    </clipPath>
  </defs>

  <!-- Dark rounded background -->
  <rect width="192" height="192" rx="38" ry="38" fill="#0A0A0F"/>

  <!-- Subtle radial glow behind the bars -->
  <radialGradient id="glow192" cx="50%" cy="55%" r="40%">
    <stop offset="0%" stop-color="#6366F1" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
  </radialGradient>
  <rect width="192" height="192" rx="38" ry="38" fill="url(#glow192)"/>

  <!-- Waveform / equalizer bars -->
  <g clip-path="url(#roundClip192)">
    <!-- 7 bars centered horizontally, each 12px wide with 6px gap -->
    <!-- Total width: 7*12 + 6*6 = 120, offset-x = (192-120)/2 = 36 -->
    <rect x="36"  y="72"  width="12" height="48" rx="6" fill="url(#waveGrad192)" opacity="0.75"/>
    <rect x="54"  y="52"  width="12" height="88" rx="6" fill="url(#waveGrad192)" opacity="0.82"/>
    <rect x="72"  y="38"  width="12" height="116" rx="6" fill="url(#waveGrad192)" opacity="0.90"/>
    <rect x="90"  y="28"  width="12" height="136" rx="6" fill="url(#waveGrad192)"/>
    <rect x="108" y="38"  width="12" height="116" rx="6" fill="url(#waveGrad192)" opacity="0.90"/>
    <rect x="126" y="52"  width="12" height="88" rx="6" fill="url(#waveGrad192)" opacity="0.82"/>
    <rect x="144" y="72"  width="12" height="48" rx="6" fill="url(#waveGrad192)" opacity="0.75"/>
  </g>
</svg>
